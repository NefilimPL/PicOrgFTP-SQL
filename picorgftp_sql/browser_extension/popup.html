<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <title>PicOrgFTP-SQL</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <header>
      <strong>PicOrgFTP-SQL</strong>
      <span id="status">Gotowe</span>
    </header>

    <section class="toolbar">
      <button id="settingsToggle" type="button">Ustawienia</button>
      <button id="filtersToggle" type="button">Filtry</button>
      <button id="selectAll" type="button">Zaznacz</button>
      <button id="clearSelection" type="button">Odznacz</button>
      <button id="retryFailed" type="button" class="retry" disabled>Ponow bledy</button>
      <button id="uploadSelected" type="button" class="primary">Wyslij do panelu</button>
    </section>

    <section id="settingsPanel" class="settings panel" hidden>
      <label>
        Adres panelu
        <input id="panelUrl" autocomplete="off" spellcheck="false">
      </label>
      <label>
        Token
        <input id="apiToken" type="password" autocomplete="off" spellcheck="false">
      </label>
      <div class="actions">
        <button id="saveSettings" type="button">Zapisz</button>
        <button id="testConnection" type="button">Test</button>
      </div>
    </section>

    <section id="filtersPanel" class="filters panel" hidden>
      <label>
        Min. szerokosc
        <input id="minWidth" type="number" min="0" step="50" value="0">
      </label>
      <label>
        Min. wysokosc
        <input id="minHeight" type="number" min="0" step="50" value="0">
      </label>
      <label>
        Szukaj w linku
        <input id="urlFilter" autocomplete="off" spellcheck="false" placeholder="np. large_default !thumb">
      </label>
      <label class="check-row">
        <input id="hideThumbnails" type="checkbox">
        Ukryj miniatury
      </label>
    </section>

    <section class="scan-row">
      <button id="scanPage" type="button">Skanuj strone</button>
    </section>

    <div id="summary" class="summary">Brak zeskanowanych zdjec.</div>
    <div id="images" class="images"></div>

    <script src="defaults.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
