<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PicOrgFTP-SQL Web</title>
    <link rel="stylesheet" href="/static/app.css?v=20260511-app-secret">
  </head>
  <body class="app-screen">
    <header class="topbar">
      <div>
        <strong>PicOrgFTP-SQL Web</strong>
        <span id="versionInfo"></span>
        <span id="serverInfo"></span>
      </div>
      <nav class="topnav" aria-label="Widoki">
        <button type="button" class="nav-button" data-modal="history">Historia</button>
        <button type="button" class="nav-button admin-only" data-modal="logs" style="display: none">Logi</button>
        <button type="button" class="nav-button" data-modal="lists">Listy</button>
        <button type="button" class="nav-button admin-only" data-modal="settings" style="display: none">Ustawienia</button>
        <button id="themeToggleButton" type="button" class="nav-button">Ciemny</button>
      </nav>
      <button id="logoutButton" type="button" class="ghost-button">Wyloguj</button>
    </header>

    <main id="workspaceView" class="workspace app-view active">
      <section class="product-section" aria-labelledby="productTitle">
        <h1 id="productTitle">Produkt</h1>
        <form id="productForm" class="product-form" autocomplete="off">
          <label class="product-id-field">
            ID produktu
            <input name="product_id" autocomplete="off" spellcheck="false" readonly placeholder="Nowy wpis">
          </label>
          <label>
            Nazwa
            <input name="name" autocomplete="off" spellcheck="false" required>
          </label>
          <label>
            Typ
            <input name="type_name" autocomplete="off" spellcheck="false" required>
          </label>
          <label>
            Model
            <input name="model" autocomplete="off" spellcheck="false" required>
          </label>
          <label>
            <span data-product-field-label="color1">Kolor 1</span>
            <input name="color1" autocomplete="off" spellcheck="false" required>
          </label>
          <label>
            <span data-product-field-label="color2">Kolor 2</span>
            <input name="color2" autocomplete="off" spellcheck="false">
          </label>
          <label>
            <span data-product-field-label="color3">Kolor 3</span>
            <input name="color3" autocomplete="off" spellcheck="false">
          </label>
          <label>
            Dodatek
            <input name="extra" autocomplete="off" spellcheck="false" placeholder="NO-LED">
          </label>
          <label>
            EAN
            <input name="ean" inputmode="numeric" maxlength="13" autocomplete="new-password" spellcheck="false">
          </label>
          <div class="lookup-actions">
            <button id="findByEanButton" type="button" class="secondary-button">Szukaj EAN</button>
            <button id="findProductButton" type="button" class="secondary-button">Dopasuj produkt</button>
          </div>
          <label class="entry-select-field">
            Istniejacy wpis
            <select id="entrySelect">
              <option value="">Brak wybranego wpisu</option>
            </select>
          </label>
          <div class="form-actions">
            <button id="submitButton" type="submit" title="Pobiera brakujace zdjecia z FTP i uzupelnia lokalne pliki.">Synchronizuj</button>
            <button id="clearButton" type="button" class="secondary-button">Wyczysc dane</button>
            <span id="formStatus" role="status"></span>
          </div>
        </form>
      </section>

      <section class="slots-section" aria-labelledby="slotsTitle">
        <div class="section-heading">
          <h2 id="slotsTitle">Sloty zdjec</h2>
          <div class="heading-actions subtle-metrics">
            <span id="slotCount"></span>
            <span id="fileIndexInfo"></span>
            <span id="latencyInfo"></span>
          </div>
        </div>
        <div id="slotGrid" class="slot-grid"></div>
      </section>

      <section class="result-section" aria-labelledby="resultTitle">
        <div class="section-heading">
          <h2 id="resultTitle">Wynik</h2>
          <span id="resultMeta"></span>
        </div>
        <div id="resultOutput" class="result-output empty-state">Brak wykonanych operacji.</div>
      </section>
    </main>

    <div id="entryModal" class="modal-view">
      <section class="modal-panel compact-modal">
        <div class="section-heading">
          <h1>Istniejace wpisy</h1>
          <button type="button" class="ghost-button modal-close" data-close-modal> Zamknij </button>
        </div>
        <div id="entryMatches" class="entry-matches"></div>
      </section>
    </div>

    <div id="listsView" class="manager-view modal-view">
      <section class="manager-panel">
        <div class="section-heading">
          <h1>Edytor list</h1>
          <div class="heading-actions">
            <span id="listStatus"></span>
            <button type="button" class="ghost-button modal-close" data-close-modal>Zamknij</button>
          </div>
        </div>
        <div class="list-editor-layout">
          <aside id="listTabs" class="list-tabs"></aside>
          <section class="list-editor">
            <form id="listAddForm" class="inline-form">
              <input id="listAddInput" placeholder="Nowa wartosc">
              <button type="submit">Dodaj</button>
            </form>
            <div id="listValues" class="list-values"></div>
          </section>
        </div>
      </section>
    </div>

    <div id="listUsageModal" class="modal-view">
      <section class="modal-panel compact-modal">
        <div class="section-heading">
          <h1 id="listUsageTitle">Wpis uzywany przez produkty</h1>
          <button type="button" class="ghost-button modal-close" data-close-modal>Zamknij</button>
        </div>
        <div id="listUsageOutput" class="entry-matches"></div>
      </section>
    </div>

    <div id="historyView" class="manager-view modal-view">
      <section class="manager-panel">
        <div class="section-heading">
          <h1>Historia zmian</h1>
          <div class="heading-actions">
            <select id="historyUserFilter" aria-label="Filtr uzytkownika">
              <option value="">Wszyscy uzytkownicy</option>
            </select>
            <button id="historyRefreshButton" type="button" class="secondary-button">Odswiez</button>
            <button type="button" class="ghost-button modal-close" data-close-modal>Zamknij</button>
          </div>
        </div>
        <div id="historyOutput" class="history-output empty-state">Brak historii.</div>
      </section>
    </div>

    <div id="historyDetailModal" class="modal-view">
      <section class="modal-panel compact-modal">
        <div class="section-heading">
          <h1 id="historyDetailTitle">Historia EAN</h1>
          <button type="button" class="ghost-button modal-close" data-close-history-detail>Zamknij</button>
        </div>
        <div id="historyDetailOutput" class="history-detail-output"></div>
      </section>
    </div>

    <div id="logsView" class="manager-view modal-view">
      <section class="manager-panel">
        <div class="section-heading">
          <h1>Logi</h1>
          <div class="heading-actions">
            <button id="logsRefreshButton" type="button" class="secondary-button">Odswiez</button>
            <button id="logsClearButton" type="button" class="danger-button">Wyczysc logi</button>
            <button type="button" class="ghost-button modal-close" data-close-modal>Zamknij</button>
          </div>
        </div>
        <div id="logsOutput" class="logs-output empty-state">Logi sa dostepne tylko dla administratora.</div>
      </section>
    </div>

    <div id="logsClearModal" class="modal-view">
      <section class="modal-panel compact-modal">
        <div class="section-heading">
          <h1>Czyszczenie logow</h1>
          <button type="button" class="ghost-button modal-close" data-close-logs-clear>Anuluj</button>
        </div>
        <form id="logsClearForm" class="settings-grid">
          <label>
            Haslo administratora
            <input id="logsClearPassword" type="password" autocomplete="current-password" />
          </label>
          <div class="heading-actions">
            <button type="submit" class="danger-button">Wyczysc logi</button>
            <span id="logsClearStatus"></span>
          </div>
        </form>
      </section>
    </div>

    <div id="settingsView" class="manager-view modal-view">
      <section class="manager-panel">
        <div class="section-heading">
          <h1>Ustawienia</h1>
          <div class="heading-actions">
            <span id="settingsStatus"></span>
            <button type="button" class="ghost-button modal-close" data-close-modal>Zamknij</button>
          </div>
        </div>
        <div class="settings-tabs">
          <button type="button" class="settings-tab active" data-settings-tab="app">Aplikacja</button>
          <button type="button" class="settings-tab" data-settings-tab="processing">Obrobka</button>
          <button type="button" class="settings-tab" data-settings-tab="ftp">FTP</button>
          <button type="button" class="settings-tab" data-settings-tab="sql">SQL</button>
          <button type="button" class="settings-tab" data-settings-tab="slots">Sloty</button>
          <button type="button" class="settings-tab" data-settings-tab="users">Uzytkownicy</button>
        </div>
        <div id="settingsOutput" class="settings-grid"></div>
      </section>
    </div>

    <datalist id="namesList"></datalist>
    <datalist id="typesList"></datalist>
    <datalist id="modelsList"></datalist>
    <datalist id="colorsList"></datalist>
    <datalist id="extrasList"></datalist>

    <template id="slotTemplate">
      <article class="slot-card">
        <div class="slot-preview">
          <span class="slot-empty">Brak pliku</span>
          <img alt="">
        </div>
        <div class="slot-meta">
          <strong></strong>
          <span></span>
        </div>
        <label class="file-picker">
          <input type="file" accept="image/*,.pdf,.eps,.psd,.ai,.tif,.tiff">
          <span>Wybierz plik</span>
        </label>
      </article>
    </template>

    <script src="/static/app.js?v=20260514-slot-sync-race"></script>
  </body>
</html>
