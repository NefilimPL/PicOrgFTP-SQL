<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PicOrgFTP-SQL Web</title>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body class="login-screen">
    <main class="login-panel">
      <h1>PicOrgFTP-SQL Web</h1>
      <form id="loginForm" class="login-form">
        <label>
          Uzytkownik
          <input name="username" autocomplete="username" value="admin" required>
        </label>
        <label>
          Haslo
          <input name="password" type="password" autocomplete="current-password" required autofocus>
        </label>
        <button type="submit">Zaloguj</button>
        <p id="loginMessage" class="form-message" role="status"></p>
      </form>
    </main>
    <script>
      const form = document.querySelector("#loginForm");
      const message = document.querySelector("#loginMessage");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.textContent = "";
        const response = await fetch("/api/login", {
          method: "POST",
          headers: { "X-Requested-With": "XMLHttpRequest" },
          body: new FormData(form),
        });
        if (response.ok) {
          window.location.href = "/";
          return;
        }
        const payload = await response.json().catch(() => ({}));
        message.textContent = payload.detail || "Logowanie nie powiodlo sie.";
      });
    </script>
  </body>
</html>
