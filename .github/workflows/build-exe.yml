name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (pinned packager)
        run: |
          python -m pip install --upgrade pip
          # Pin PyInstaller to avoid known Windows CI weirdness and keep builds reproducible
          python -m pip install "pyinstaller>=6.6,<7"
          python -m pip install -r requirements-build.txt

      - name: Build EXE with PyInstaller (recommended onedir + minimal collection)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --log-level=DEBUG `
            --name PicOrgFTP-SQL `
            --noconsole `
            --add-data "picorgftp_sql/Localization;picorgftp_sql/Localization" `
            --collect-submodules mysql.connector `
            --collect-data mysql.connector `
            PicOrgFTP-SQL.pyw

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: PicOrgFTP-SQL-build-logs
          path: |
            build/**/*.log
            dist/**/*.log
          if-no-files-found: warn

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PicOrgFTP-SQL-windows
          path: dist/PicOrgFTP-SQL
