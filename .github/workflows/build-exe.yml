name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (pinned packager)
        run: |
          python -m pip install --upgrade pip
          # build.ps1 installs the rest (including PyInstaller + requirements-build.txt)

      - name: Build EXE with build.ps1
        shell: pwsh
        run: |
          & "Dodatkowe (konwerter)/build.ps1"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PicOrgFTP-SQL-windows
          path: dist/PicOrgFTP-SQL
