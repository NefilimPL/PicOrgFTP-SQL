name: Build Windows EXE

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  select-runner:
    name: Select Windows runners
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      runs_on: ${{ steps.select.outputs.runs_on }}
      runner_names: ${{ steps.select.outputs.runner_names }}
      using_self_hosted: ${{ steps.select.outputs.using_self_hosted }}
      available_count: ${{ steps.select.outputs.available_count }}

    steps:
      - name: Select GitHub Actions runners
        id: select
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.ACTIONS_RUNNER_READ_TOKEN || github.token }}
          script: |
            const fallbackRunsOn = JSON.stringify('windows-latest');
            const selfHostedLabels = ['self-hosted', 'Windows', 'X64'];

            function useFallback(message) {
              core.warning(message);
              core.setOutput('runs_on', fallbackRunsOn);
              core.setOutput('runner_names', 'windows-latest');
              core.setOutput('using_self_hosted', 'false');
              core.setOutput('available_count', '0');
            }

            try {
              const { owner, repo } = context.repo;
              const runners = await github.paginate(
                github.rest.actions.listSelfHostedRunnersForRepo,
                {
                  owner,
                  repo,
                  per_page: 100,
                },
              );
              const requiredLabels = selfHostedLabels.map((label) => label.toLowerCase());
              const availableRunners = runners.filter((runner) => {
                const labels = new Set(
                  (runner.labels || []).map((label) => String(label.name).toLowerCase()),
                );
                return (
                  runner.status === "online" &&
                  runner.busy === false &&
                  requiredLabels.every((label) => labels.has(label))
                );
              });

              if (availableRunners.length === 0) {
                useFallback(
                  'No idle online self-hosted Windows X64 runner was found. Falling back to windows-latest.',
                );
                return;
              }

              const runnerNames = availableRunners.map((runner) => runner.name).join(', ');
              core.notice(`Using ${availableRunners.length} self-hosted runner(s): ${runnerNames}`);
              core.setOutput('runs_on', JSON.stringify(selfHostedLabels));
              core.setOutput('runner_names', runnerNames);
              core.setOutput('using_self_hosted', 'true');
              core.setOutput('available_count', String(availableRunners.length));
            } catch (error) {
              useFallback(
                `Could not query self-hosted runners. Falling back to windows-latest. ${error.message}`,
              );
            }

      - name: Runner selection summary
        shell: bash
        run: |
          {
            echo "### Runner selection"
            echo ""
            echo "- Runners: ${{ steps.select.outputs.runner_names }}"
            echo "- Available self-hosted runners: ${{ steps.select.outputs.available_count }}"
            echo "- Self-hosted: ${{ steps.select.outputs.using_self_hosted }}"
            echo "- runs-on: \`${{ steps.select.outputs.runs_on }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build-windows:
    name: Build ${{ matrix.name }}
    needs: select-runner
    runs-on: ${{ fromJSON(needs.select-runner.outputs.runs_on) }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: local
            name: desktop EXE
          - target: web
            name: web EXE and ZIP

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        if: needs.select-runner.outputs.using_self_hosted != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Resolve Python 3.x
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $candidatePaths = [System.Collections.Generic.List[string]]::new()

          function Add-Candidate {
            param([string]$Path)
            if ([string]::IsNullOrWhiteSpace($Path)) {
              return
            }
            $candidate = $Path.Trim()
            if (-not $candidatePaths.Contains($candidate)) {
              $candidatePaths.Add($candidate)
            }
          }

          $versionsToTry = @("3.14", "3.13", "3.12", "3.11")

          if ("${{ needs.select-runner.outputs.using_self_hosted }}" -eq "true") {
            if (Get-Command py -ErrorAction SilentlyContinue) {
              foreach ($versionToTry in $versionsToTry) {
                $pyPath = (& py "-$versionToTry" -c "import sys; print(sys.executable)" 2>$null | Select-Object -First 1)
                if ($LASTEXITCODE -eq 0) {
                  Add-Candidate $pyPath
                }
              }
            }
          }

          if (Get-Command python -ErrorAction SilentlyContinue) {
            $pythonPath = (& python -c "import sys; print(sys.executable)" 2>$null | Select-Object -First 1)
            if ($LASTEXITCODE -eq 0) {
              Add-Candidate $pythonPath
            }
          }

          foreach ($candidate in $candidatePaths) {
            $version = (& $candidate -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')" 2>$null | Select-Object -First 1)
            if ($LASTEXITCODE -eq 0 -and $versionsToTry.Contains($version)) {
              "PICORGFTP_SQL_PYTHON=$candidate" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              & $candidate --version
              exit 0
            }
          }

          throw "Python 3.14, 3.13, 3.12 or 3.11 was not found. On a self-hosted Windows runner install Python 3.14 with: winget install -e --id Python.Python.3.14 --scope machine"

      - name: Set release/build version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            $version = "${{ github.event.release.tag_name }}"
          } elseif ("${{ github.ref }}" -like "refs/tags/*") {
            $version = "${{ github.ref_name }}"
          } else {
            $version = "dev-${{ github.run_number }}"
          }
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "dev-${{ github.run_number }}"
          }
          $assetVersion = $version -replace '[^A-Za-z0-9_.-]', '-'
          Set-Content -Path "picorgftp_sql/VERSION" -Value $version -Encoding utf8
          "PICORGFTP_SQL_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PICORGFTP_SQL_ASSET_VERSION=$assetVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies (pinned packager)
        shell: pwsh
        run: |
          & $env:PICORGFTP_SQL_PYTHON -m pip install --upgrade pip
          & $env:PICORGFTP_SQL_PYTHON -m pip install "pyinstaller>=6.6,<7"
          & $env:PICORGFTP_SQL_PYTHON -m pip install -r requirements-build.txt
          if ("${{ matrix.target }}" -eq "web") {
            & $env:PICORGFTP_SQL_PYTHON -m pip install -r requirements-web.txt
          }

      - name: Prepare Windows icons
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "build/icons" -Force | Out-Null
          & $env:PICORGFTP_SQL_PYTHON -c "from PIL import Image; Image.open(r'pic/PIC_LOCAL.png').save(r'build/icons/PIC_LOCAL.ico', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)]); Image.open(r'pic/PIC_WEB.png').save(r'build/icons/PIC_WEB.ico', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])"

      - name: Prepare Windows version metadata
        shell: pwsh
        run: |
          & $env:PICORGFTP_SQL_PYTHON tools/generate_windows_version_info.py `
            --output "build/version-info/PicOrgFTP-SQL.version.txt" `
            --file-description "PicOrgFTP-SQL desktop application" `
            --internal-name "PicOrgFTP-SQL" `
            --original-filename "PicOrgFTP-SQL.exe"
          & $env:PICORGFTP_SQL_PYTHON tools/generate_windows_version_info.py `
            --output "build/version-info/PicOrgFTP-SQL-WEB.version.txt" `
            --file-description "PicOrgFTP-SQL web manager" `
            --internal-name "PicOrgFTP-SQL-WEB" `
            --original-filename "PicOrgFTP-SQL-WEB.exe"

      - name: Build local EXE with PyInstaller
        if: matrix.target == 'local'
        shell: pwsh
        env:
          PICORGFTP_SQL_HEADLESS: "1"
          PYINSTALLER_BUILD: "1"
        run: |
          & $env:PICORGFTP_SQL_PYTHON -m PyInstaller --noconfirm --clean --log-level=WARN `
            --name PicOrgFTP-SQL `
            --noconsole `
            --onefile `
            --distpath "dist/output" `
            --workpath "build/output-local" `
            --icon "build/icons/PIC_LOCAL.ico" `
            --version-file "build/version-info/PicOrgFTP-SQL.version.txt" `
            --collect-submodules mysql.connector `
            --collect-data mysql.connector `
            --collect-data certifi `
            --add-data "picorgftp_sql/Localization;picorgftp_sql/Localization" `
            --add-data "picorgftp_sql/VERSION;picorgftp_sql" `
            --add-data "pic/PIC_LOCAL.png;pic" `
            PicOrgFTP-SQL.pyw
          Copy-Item -Path "picorgftp_sql/Localization" -Destination "dist/output/Localization" -Recurse -Force
          Copy-Item -Path "picorgftp_sql/VERSION" -Destination "dist/output/VERSION" -Force

      - name: Build web manager EXE with PyInstaller
        if: matrix.target == 'web'
        shell: pwsh
        env:
          PICORGFTP_SQL_HEADLESS: "1"
          PYINSTALLER_BUILD: "1"
        run: |
          & $env:PICORGFTP_SQL_PYTHON -m PyInstaller --noconfirm --clean --log-level=WARN `
            --name PicOrgFTP-SQL-WEB `
            --noconsole `
            --onefile `
            --distpath "dist/output" `
            --workpath "build/output-web" `
            --icon "build/icons/PIC_WEB.ico" `
            --version-file "build/version-info/PicOrgFTP-SQL-WEB.version.txt" `
            --collect-submodules picorgftp_sql `
            --collect-submodules mysql.connector `
            --collect-submodules uvicorn `
            --collect-submodules fastapi `
            --collect-submodules starlette `
            --collect-submodules multipart `
            --collect-submodules pystray `
            --collect-submodules PIL `
            --collect-data mysql.connector `
            --collect-data certifi `
            --add-data "picorgftp_sql/web/static;picorgftp_sql/web/static" `
            --add-data "picorgftp_sql/browser_extension;picorgftp_sql/browser_extension" `
            --add-data "picorgftp_sql/Localization;picorgftp_sql/Localization" `
            --add-data "picorgftp_sql/VERSION;picorgftp_sql" `
            --add-data "pic/PIC_WEB.png;pic" `
            PicOrgFTP-SQL-WEB.pyw

      - name: Package web runtime
        if: matrix.target == 'web'
        shell: pwsh
        run: |
          $webRoot = "dist/web/PicOrgFTP-SQL-web"
          Remove-Item -Path "dist/web" -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $webRoot -Force | Out-Null
          Copy-Item -Path "dist/output/PicOrgFTP-SQL-WEB.exe" -Destination "$webRoot/PicOrgFTP-SQL-WEB.exe" -Force
          Copy-Item -Path "picorgftp_sql" -Destination "$webRoot/picorgftp_sql" -Recurse -Force
          Copy-Item -Path "pic" -Destination "$webRoot/pic" -Recurse -Force
          Copy-Item -Path "tools" -Destination "$webRoot/tools" -Recurse -Force
          Copy-Item -Path "requirements-web.txt", "START_WEB.bat", "STOP_WEB.bat", "README.md", "LICENSE", "PicOrgFTP-SQL-WEB.pyw" -Destination $webRoot -Force
          $zipPath = "dist/web/PicOrgFTP-SQL-web-$env:PICORGFTP_SQL_ASSET_VERSION.zip"
          Compress-Archive -Path "$webRoot/*" -DestinationPath $zipPath -Force

      - name: Prepare local release asset
        if: github.event_name == 'release' && matrix.target == 'local'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "dist/release" -Force | Out-Null
          Copy-Item -Path "dist/output/PicOrgFTP-SQL.exe" -Destination "dist/release/PicOrgFTP-SQL-$env:PICORGFTP_SQL_ASSET_VERSION.exe" -Force

      - name: Prepare web release assets
        if: github.event_name == 'release' && matrix.target == 'web'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "dist/release" -Force | Out-Null
          Copy-Item -Path "dist/output/PicOrgFTP-SQL-WEB.exe" -Destination "dist/release/PicOrgFTP-SQL-WEB-$env:PICORGFTP_SQL_ASSET_VERSION.exe" -Force
          Copy-Item -Path "dist/web/PicOrgFTP-SQL-web-$env:PICORGFTP_SQL_ASSET_VERSION.zip" -Destination "dist/release/PicOrgFTP-SQL-web-$env:PICORGFTP_SQL_ASSET_VERSION.zip" -Force

      - name: Prepare artifact upload probe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "build" -Force | Out-Null
          Set-Content -Path "build/artifact-upload-probe.txt" -Value "Artifact upload probe for $env:GITHUB_REPOSITORY run $env:GITHUB_RUN_ID target ${{ matrix.target }}" -Encoding utf8

      - name: Check artifact upload availability
        id: artifact-probe
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: PicOrgFTP-SQL-artifact-probe-${{ matrix.target }}-${{ github.run_id }}
          path: build/artifact-upload-probe.txt
          if-no-files-found: error
          retention-days: 1

      - name: Upload Windows artifact
        id: upload-windows
        if: matrix.target == 'local' && steps.artifact-probe.outcome == 'success'
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: PicOrgFTP-SQL-windows
          path: dist/output/PicOrgFTP-SQL.exe
          retention-days: 7

      - name: Upload web EXE artifact
        id: upload-web-exe
        if: matrix.target == 'web' && steps.artifact-probe.outcome == 'success'
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: PicOrgFTP-SQL-web-exe
          path: dist/output/PicOrgFTP-SQL-WEB.exe
          retention-days: 7

      - name: Upload web artifact
        id: upload-web
        if: matrix.target == 'web' && steps.artifact-probe.outcome == 'success'
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: PicOrgFTP-SQL-web
          path: dist/web/*.zip
          retention-days: 7

      - name: Report skipped artifact upload
        if: steps.artifact-probe.outcome != 'success'
        shell: pwsh
        run: |
          "Artifact upload was skipped for ${{ matrix.target }} because the upload probe failed. The EXE build completed; check upload-artifact logs for quota or permission details." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Report failed Windows artifact upload
        if: matrix.target == 'local' && steps.artifact-probe.outcome == 'success' && steps.upload-windows.outcome != 'success'
        shell: pwsh
        run: |
          "Artifact upload was skipped or failed for PicOrgFTP-SQL-windows. The EXE build completed; check upload-artifact logs for quota or permission details." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Report failed web artifact upload
        if: matrix.target == 'web' && steps.artifact-probe.outcome == 'success' && (steps.upload-web-exe.outcome != 'success' || steps.upload-web.outcome != 'success')
        shell: pwsh
        run: |
          "Artifact upload was skipped or partially failed for web outputs. The EXE build completed; check upload-artifact logs for quota or permission details." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Publish local asset to release
        id: publish-local-release-asset
        if: github.event_name == 'release' && matrix.target == 'local'
        continue-on-error: true
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$env:PICORGFTP_SQL_VERSION" `
            "dist/release/PicOrgFTP-SQL-$env:PICORGFTP_SQL_ASSET_VERSION.exe" `
            --clobber

      - name: Publish web assets to release
        id: publish-web-release-assets
        if: github.event_name == 'release' && matrix.target == 'web'
        continue-on-error: true
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$env:PICORGFTP_SQL_VERSION" `
            "dist/release/PicOrgFTP-SQL-WEB-$env:PICORGFTP_SQL_ASSET_VERSION.exe" `
            "dist/release/PicOrgFTP-SQL-web-$env:PICORGFTP_SQL_ASSET_VERSION.zip" `
            --clobber

      - name: Report skipped local release asset upload
        if: github.event_name == 'release' && matrix.target == 'local' && steps.publish-local-release-asset.outcome != 'success'
        shell: pwsh
        run: |
          "Release asset upload was skipped or failed for the local EXE. The EXE build completed; check gh release upload logs for quota or permission details." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Report skipped web release asset upload
        if: github.event_name == 'release' && matrix.target == 'web' && steps.publish-web-release-assets.outcome != 'success'
        shell: pwsh
        run: |
          "Release asset upload was skipped or failed for web outputs. The EXE build completed; check gh release upload logs for quota or permission details." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
