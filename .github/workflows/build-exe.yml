name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (pinned packager)
        run: |
          python -m pip install --upgrade pip
          # Pin PyInstaller to avoid known Windows CI weirdness and keep builds reproducible
          python -m pip install "pyinstaller>=6.6,<7"
          python -m pip install -r requirements-build.txt

      - name: Build EXE with PyInstaller (onefile + external Localization)
        shell: pwsh
        env:
          PICORGFTP_SQL_HEADLESS: "1"
          PYINSTALLER_BUILD: "1"
        run: |
          pyinstaller --noconfirm --clean --log-level=WARN `
            --name PicOrgFTP-SQL `
            --noconsole `
            --onefile `
            --collect-submodules mysql.connector `
            --collect-data mysql.connector `
            --collect-data certifi `
            PicOrgFTP-SQL.pyw
          Copy-Item -Path "picorgftp_sql/Localization" -Destination "dist/Localization" -Recurse -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PicOrgFTP-SQL-windows
          path: |
            dist/PicOrgFTP-SQL.exe
            dist/Localization
